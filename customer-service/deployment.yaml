apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-service
  namespace: bookstore-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-service
  template:
    metadata:
      labels:
        app: customer-service
    spec:
      containers:
      - name: customer-service
        image: linyul/customer-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: bookstore-config
              key: db-host
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: bookstore-config
              key: db-name
        - name: KAFKA_SERVERS
          valueFrom:
            configMapKeyRef:
              name: bookstore-config
              key: kafka-servers
        - name: KAFKA_TOPIC
          valueFrom:
            configMapKeyRef:
              name: bookstore-config
              key: kafka-topic
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: bookstore-secrets
              key: db-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: bookstore-secrets
              key: db-password
        livenessProbe:
          httpGet:
            path: /status
            port: 3000
          initialDelaySeconds: 100
          periodSeconds: 10
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: customer-service
  namespace: bookstore-ns
spec:
  selector:
    app: customer-service
  ports:
    - port: 80
      targetPort: 3000