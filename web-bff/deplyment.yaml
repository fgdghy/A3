apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app-bff
  namespace: bookstore-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-app-bff
  template:
    metadata:
      labels:
        app: web-app-bff
    spec:
      containers:
      - name: web-app-bff
        image: linyul/web-bff:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: URL_BASE_BOOK
          value: "http://book-service:3000"
        - name: URL_BASE_CUSTOMER
          value: "http://customer-service:80"
        livenessProbe:
          httpGet:
            path: /status
            port: 3000
          initialDelaySeconds: 100
          periodSeconds: 10
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: web-app-bff-lb
  namespace: bookstore-ns
spec:
  type: LoadBalancer
  selector:
    app: web-app-bff
  ports:
    - port: 80
      targetPort: 3000