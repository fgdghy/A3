apiVersion: apps/v1
kind: Deployment
metadata:
  name: book-service
  namespace: bookstore-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: book-service
  template:
    metadata:
      labels:
        app: book-service
    spec:
      containers:
      - name: book-service
        image: linyul/book-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: DB_HOST
          value: "bookstore-db-dev-instance1.c2qxlb8d3arf.us-east-1.rds.amazonaws.com"
        - name: DB_NAME
          value: "books_db"
        - name: DB_USER
          value: "admin"
        - name: DB_PASSWORD
          value: "12345678"
        - name: DB_NAME
          value: "customers_db"
        - name: URL_BASE_RECOMMENDATION
          value: "http://34.195.107.7"
        livenessProbe:
          httpGet:
            path: /status
            port: 3000
          initialDelaySeconds: 100
          periodSeconds: 10
          failureThreshold: 3
        volumeMounts:
        - name: cb-vol
          mountPath: /data/circuit-breaker
      volumes:
      - name: cb-vol
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: book-service
  namespace: bookstore-ns
spec:
  selector:
    app: book-service
  ports:
    - port: 3000
      targetPort: 3000